ID: itm-poc-ui
_schema-version: "2.1"
version: 1.0.0

parameters:
  deploy_mode: html5-repo

modules:
  - name: itm-poc-ui
    type: approuter.nodejs
    path: itm-poc-approuter
    parameters:
      memory: 256M
      disk-quota: 512M
    properties:
          SEND_XFRAMEOPTIONS: false
          TENANT_HOST_PATTERN: "^(.*)-${default-uri}"
    provides:
      - name: itm-poc-ui-url
        properties:
          url: ${default-url}
    requires:
      - name: cw-itm-Html5RepoRuntime
      - name: cw-itm-xsuaa
      - name: cw-itm-connectivity

  - name: itm-poc-ui-deployer
    type: com.sap.html5.application-content
    path: itm-poc-ui-deployer
    requires:
      - name: cw-itm-Html5RepoHost
    build-parameters:
      requires:
        - name: itm-poc-ui-webapp
          artifacts:
            - "./*"
          target-path: resources/itm-poc-ui

  - name: itm-poc-ui-webapp
    type: html5
    path: itm-poc-webapp
    build-parameters:
      builder: custom
      commands:
        - npm install -f
        - npm run build
      build-result: dist
      supported-platforms: []

resources:
  # Bind to existing service instances
  - name: cw-itm-Html5RepoRuntime
    type: org.cloudfoundry.managed-service
    parameters:
      service-name: cw-itm-Html5RepoRuntime
      service-plan: app-runtime
      service: html5-apps-repo

  - name: cw-itm-Html5RepoHost
    type: org.cloudfoundry.managed-service
    parameters:
      service-name: cw-itm-Html5RepoHost
      service-plan: app-host
      service: html5-apps-repo

  - name: cw-itm-xsuaa
    type: org.cloudfoundry.existing-service
    parameters:
      service: xsuaa
      service-plan: broker
      service-name: cw-itm-xsuaa
      path: ./xs-security.json

  - name: cw-itm-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service-name: cw-itm-connectivity
      service-plan: lite
      service: connectivity

