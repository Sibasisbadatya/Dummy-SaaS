ID: Product
_schema-version: "2.1"
version: 1.0.0

parameters:
  deploy_mode: html5-repo

modules:
  - name: product
    type: approuter.nodejs
    path: smart-order-approuter
    parameters:
      memory: 256M
      disk-quota: 512M
    properties:
          SEND_XFRAMEOPTIONS: false
          TENANT_HOST_PATTERN: "^(.*)-${default-uri}"
    provides:
      - name: product-url
        properties:
          url: ${default-url}
    requires:
      - name: cw-itm-Html5RepoRuntime
      - name: cw-itm-xsuaa
      - name: cw-itm-connectivity
      - name: cw-itm-saas-registry

  - name: product-deployer
    type: com.sap.html5.application-content
    path: smart-order-ui-deployer
    requires:
      - name: cw-itm-Html5RepoHost
    build-parameters:
      requires:
        - name: product-webapp
          artifacts:
            - "./*"
          target-path: resources/product

  - name: product-webapp
    type: html5
    path: smart-order-webapp
    build-parameters:
      builder: custom
      commands:
        - npm install -f
        - npm run build
      build-result: dist
      supported-platforms: []

resources:
  # Bind to existing service instances
  - name: cw-itm-Html5RepoRuntime
    type: org.cloudfoundry.managed-service
    parameters:
      service-name: cw-itm-Html5RepoRuntime
      service-plan: app-runtime
      service: html5-apps-repo

  - name: cw-itm-Html5RepoHost
    type: org.cloudfoundry.managed-service
    parameters:
      service-name: cw-itm-Html5RepoHost
      service-plan: app-host
      service: html5-apps-repo

  - name: cw-itm-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      service-name: cw-itm-xsuaa
      path: ./xs-security.json

  - name: cw-itm-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service-name: cw-itm-connectivity
      service-plan: lite
      service: connectivity

  - name: cw-itm-saas-registry
    type: org.cloudfoundry.managed-service
    parameters:
      service: saas-registry
      service-plan: application
      service-name: cw-itm-saas-registry
      config:
        appName: product
        displayName: ITM SaaS Product
        description: ITM Multi-Tenant Application
        category: Partner Solutions
        xsappname: cw-itm-xsuaa
        appUrls:
          getDependencies: ~{product-url/url}/callback/v1.0/dependencies
          onSubscription: ~{product-url/url}/callback/v1.0/tenants/{tenantId}
    requires:
      - name: cw-itm-xsuaa
      - name: product-url

